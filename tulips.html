<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title> Surprise 🌷</title>

<style>

body{
margin:0;
height:100vh;
overflow:hidden;
font-family: 'Segoe UI', sans-serif;
background: radial-gradient(circle at top,#0f2027,#203a43,#2c5364);
display:flex;
justify-content:center;
align-items:center;
color:white;
}

/* envelope */

#envelope{
width:220px;
height:150px;
position:relative;
cursor:pointer;
transition:1s;
}

#envelope:before{
content:"";
position:absolute;
width:100%;
height:100%;
background:#ff6fa5;
border-radius:8px;
}

#flap{
position:absolute;
width:100%;
height:100%;
background:#ff85b5;
clip-path:polygon(0 0,100% 0,50% 60%);
transform-origin:top;
transition:1s;
}

.open #flap{
transform:rotateX(180deg);
}

#openText{
position:absolute;
top:170px;
width:100%;
text-align:center;
font-size:20px;
}

/* message */

#scene{
display:none;
text-align:center;
animation:fade 2s;
}

#msg{
font-size:28px;
max-width:420px;
line-height:1.4;
text-shadow:0 0 20px #ff9ac6;
}

@keyframes fade{
from{opacity:0}
to{opacity:1}
}

/* tulips */

.tulip{
position:absolute;
font-size:34px;
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10vh) rotate(0deg)}
100%{transform:translateY(110vh) rotate(360deg)}
}

/* hearts */

.heart{
position:absolute;
font-size:24px;
animation:float linear infinite;
}

@keyframes float{
0%{transform:translateY(0)}
100%{transform:translateY(-120vh)}
}

/* fireworks */

.firework{
position:absolute;
width:4px;
height:4px;
border-radius:50%;
background:white;
animation:explode 1s ease-out forwards;
}

@keyframes explode{
0%{transform:scale(1);opacity:1}
100%{transform:scale(40);opacity:0}
}

</style>
</head>

<body>

<div id="envelope">
<div id="flap"></div>
</div>

<div id="openText">Tap to Open 💌</div>

<div id="scene">
<h1>🌷</h1>
<div id="msg">
Hey… this little tulip is just for you 🌷  
I hope you smile a little today
Love to see you smiling ❤️
You deserve all smiles and happiness ❤️
</div>
</div>

<script>

const env=document.getElementById("envelope")
const scene=document.getElementById("scene")
const openText=document.getElementById("openText")

env.onclick=()=>{
env.classList.add("open")

setTimeout(()=>{
env.style.display="none"
openText.style.display="none"
scene.style.display="block"

tulips()
hearts()
setInterval(fireworks,800)

},900)

}

/* tulips */

function tulips(){

for(let i=0;i<30;i++){

let t=document.createElement("div")
t.className="tulip"
t.innerHTML="🌷"

t.style.left=Math.random()*100+"vw"
t.style.animationDuration=(4+Math.random()*4)+"s"

document.body.appendChild(t)

}

}

/* hearts */

function hearts(){

for(let i=0;i<20;i++){

let h=document.createElement("div")
h.className="heart"
h.innerHTML="❤️"

h.style.left=Math.random()*100+"vw"
h.style.bottom="-30px"
h.style.animationDuration=(5+Math.random()*3)+"s"

document.body.appendChild(h)

}

}

/* fireworks */

function fireworks(){

for(let i=0;i<15;i++){

let f=document.createElement("div")
f.className="firework"

f.style.left=Math.random()*100+"vw"
f.style.top=Math.random()*60+"vh"

document.body.appendChild(f)

setTimeout(()=>f.remove(),1000)

}

}

</script>

</body>
</html>
